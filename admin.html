<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Secretários de Educação</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#F0F4FF;min-height:100vh;color:#2d3748}
:root{--azul:#1a3a6b;--verde:#00C37A;--amarelo:#FFD93D;--laranja:#FF6B35;--borda:#E2E8F0;--cinza:#F5F7FA}

/* ── AUTH SCREEN ── */
#auth-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(145deg,#1a3a6b,#1D4ED8)
}
.auth-card{
  background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;
}
.auth-card h1{font-family:'Fredoka One',cursive;color:var(--azul);font-size:26px;margin-bottom:6px}
.auth-card p{color:#888;font-size:14px;margin-bottom:24px}
.auth-card input{
  width:100%;padding:13px 15px;border:2px solid var(--borda);border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:15px;outline:none;margin-bottom:14px;
  transition:border .2s;text-align:center;letter-spacing:4px;
}
.auth-card input:focus{border-color:var(--azul)}
.btn-auth{
  width:100%;padding:14px;border:none;border-radius:12px;
  font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;
  background:linear-gradient(135deg,var(--azul),#1D4ED8);color:#fff;
}
.err-auth{color:#E53E3E;font-size:13px;margin-top:8px;display:none;font-weight:700}

/* ── MAIN APP ── */
#app{display:none}
.topbar{
  background:linear-gradient(135deg,var(--azul),#1D4ED8);
  padding:20px 24px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 16px rgba(26,58,107,.2)
}
.topbar h1{font-family:'Fredoka One',cursive;color:#fff;font-size:20px}
.topbar-right{display:flex;gap:10px;align-items:center}
.logout-btn{
  padding:7px 14px;border:2px solid rgba(255,255,255,.3);border-radius:8px;
  background:transparent;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;
  font-size:13px;cursor:pointer;transition:background .2s
}
.logout-btn:hover{background:rgba(255,255,255,.15)}

.main{padding:24px 16px;max-width:980px;margin:0 auto}

/* ── STATS GRID ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat{
  background:#fff;border-radius:16px;padding:16px 18px;
  box-shadow:0 4px 16px rgba(26,58,107,.07);text-align:center;
}
.stat .n{font-family:'Fredoka One',cursive;font-size:34px;color:var(--azul);line-height:1}
.stat .l{font-size:12px;color:#888;font-weight:700;margin-top:4px}

/* ── SORTEIO CARD ── */
.sorteio-card{
  background:#fff;border-radius:18px;padding:20px;margin-bottom:24px;
  box-shadow:0 4px 16px rgba(26,58,107,.07);display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:14px
}
.sorteio-info h3{font-family:'Fredoka One',cursive;color:var(--azul);font-size:18px;margin-bottom:4px}
.sorteio-info p{font-size:13px;color:#666}
.winner-badge{
  background:linear-gradient(135deg,var(--amarelo),#FFB347);
  border-radius:12px;padding:10px 16px;font-weight:800;color:var(--azul);font-size:14px
}
.no-winner{
  background:#F5F7FA;border-radius:12px;padding:10px 16px;
  font-weight:700;color:#999;font-size:14px;border:2px dashed var(--borda)
}
.sorteio-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-reset{
  padding:10px 18px;border:none;border-radius:10px;font-family:'Fredoka One',cursive;
  font-size:14px;cursor:pointer;background:linear-gradient(135deg,#EF4444,#B91C1C);
  color:#fff;transition:transform .15s;box-shadow:0 3px 12px rgba(239,68,68,.3)
}
.btn-reset:active{transform:scale(.97)}
.btn-close{
  padding:10px 18px;border:none;border-radius:10px;font-family:'Fredoka One',cursive;
  font-size:14px;cursor:pointer;background:var(--cinza);color:var(--azul);
  border:2px solid var(--borda)
}

/* ── CONTROLS ── */
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-box{
  flex:1;min-width:200px;padding:10px 14px;border:2px solid var(--borda);
  border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;
  transition:border .2s;
}
.search-box:focus{border-color:var(--azul)}
.btn-export{
  padding:10px 18px;border:none;border-radius:10px;font-family:'Fredoka One',cursive;
  font-size:14px;cursor:pointer;background:linear-gradient(135deg,var(--verde),#00A066);
  color:#fff;box-shadow:0 3px 12px rgba(0,195,122,.3);transition:transform .15s
}
.btn-export:active{transform:scale(.97)}
.btn-refresh{
  padding:10px 14px;border:2px solid var(--borda);border-radius:10px;background:#fff;
  font-size:16px;cursor:pointer;transition:transform .2s
}
.btn-refresh:hover{transform:rotate(180deg)}

/* ── TABLE ── */
.table-wrap{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 16px rgba(26,58,107,.07)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--azul);color:#fff}
thead th{padding:12px 14px;text-align:left;font-weight:700;white-space:nowrap}
tbody tr{border-bottom:1px solid #F3F4F6;transition:background .15s}
tbody tr:hover{background:#F8FAFC}
tbody tr:last-child{border:none}
td{padding:11px 14px;vertical-align:middle}
.cidade-badge{
  display:inline-block;background:#EEF2FF;color:#4338CA;
  border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700
}
.funcao-badge{
  display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700
}
.fb-sec{background:#DCFCE7;color:#166534}
.fb-dir{background:#EDE9FE;color:#4C1D95}
.fb-coord{background:#FEF9C3;color:#713F12}
.fb-tec{background:#DBEAFE;color:#1E40AF}
.fb-adj{background:#E0F2FE;color:#0C4A6E}
.fb-out{background:#FCE7F3;color:#831843}
.wpp-link{
  color:var(--verde);font-weight:700;text-decoration:none;font-size:13px
}
.wpp-link:hover{text-decoration:underline}
.empty-state{text-align:center;padding:40px;color:#aaa}
.empty-state p{font-size:14px;margin-top:8px}

/* ── LOADING ── */
.loading{
  position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:99;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px
}
.loading.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid var(--borda);border-top-color:var(--verde);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-weight:700;color:var(--azul);font-size:14px}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--azul);color:#fff;padding:12px 24px;border-radius:12px;
  font-weight:700;font-size:14px;z-index:999;transition:transform .3s;pointer-events:none;
  box-shadow:0 6px 20px rgba(0,0,0,.2)
}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div><p id="ltxt">Carregando…</p></div>
<div class="toast" id="toast"></div>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>🔐 Admin</h1>
    <p>Painel de Secretários de Educação</p>
    <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="btn-auth" onclick="checkPwd()">Entrar</button>
    <div class="err-auth" id="err-auth">Senha incorreta.</div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <div class="topbar">
    <h1>🏫 Painel Admin</h1>
    <div class="topbar-right">
      <span style="color:rgba(255,255,255,.7);font-size:13px" id="evento-label"></span>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="main">

    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="n" id="st-total">—</div><div class="l">📋 Total Cadastros</div></div>
      <div class="stat"><div class="n" id="st-cidades">—</div><div class="l">🏙️ Cidades</div></div>
      <div class="stat"><div class="n" id="st-secretarios">—</div><div class="l">🎓 Secretários(as)</div></div>
      <div class="stat"><div class="n" id="st-hoje">—</div><div class="l">📅 Hoje</div></div>
    </div>

    <!-- Sorteio -->
    <div class="sorteio-card">
      <div class="sorteio-info">
        <h3>🎡 Sorteio — R$100 no Pix</h3>
        <p>Evento: <strong id="ev-id-display">—</strong></p>
      </div>
      <div id="winner-display" class="no-winner">⏳ Sem ganhador ainda</div>
      <div class="sorteio-btns">
        <button class="btn-reset" onclick="resetSorteio()">🔄 Resetar Sorteio</button>
        <button class="btn-close" onclick="closeSorteio()">🔒 Encerrar Evento</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <input class="search-box" id="search" placeholder="🔍 Buscar por nome, cidade ou função…" oninput="renderTable()">
      <button class="btn-refresh" onclick="loadData()" title="Atualizar">🔄</button>
      <button class="btn-export" onclick="exportCSV()">📥 Exportar CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Cidade</th>
            <th>Função</th>
            <th>WhatsApp</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ════════════ CONFIGURAÇÃO — copie do index.html ════════════ */
const SUPA_URL   = 'https://XXXXX.supabase.co';
const SUPA_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.XXXXX'; // ← service_role key (mais seguro)
const EVENTO_ID  = 'evento-2025-01';
const ADMIN_PASS = 'edu2025@admin'; // ← MUDE esta senha!

/* ════════════════════════════════════════════════════ */
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
let allData = [];

/* ── AUTH ── */
function checkPwd(){
  const v = document.getElementById('pwd-input').value;
  if(v === ADMIN_PASS){
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('ev-id-display').textContent = EVENTO_ID;
    document.getElementById('evento-label').textContent  = EVENTO_ID;
    loadData();
  } else {
    document.getElementById('err-auth').style.display = 'block';
  }
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('pwd-input').value='';
}

/* ── LOAD DATA ── */
async function loadData(){
  showLoading('Carregando dados…');
  try{
    const [{ data: regs }, { data: sorteio }] = await Promise.all([
      sb.from('secretarios').select('*').eq('evento', EVENTO_ID).order('created_at', { ascending: false }),
      sb.from('sorteio').select('*').eq('evento', EVENTO_ID).eq('ativo', true).single(),
    ]);
    allData = regs || [];
    updateStats(allData);
    renderTable();
    renderSorteio(sorteio);
    hideLoading();
  } catch(e){
    hideLoading();
    toast('Erro ao carregar: ' + e.message, true);
  }
}

/* ── STATS ── */
function updateStats(data){
  const hoje = new Date().toISOString().slice(0,10);
  document.getElementById('st-total').textContent = data.length;
  document.getElementById('st-cidades').textContent = new Set(data.map(d=>d.cidade)).size;
  document.getElementById('st-secretarios').textContent = data.filter(d=>d.funcao&&d.funcao.startsWith('Secretário')).length;
  document.getElementById('st-hoje').textContent = data.filter(d=>d.created_at?.slice(0,10)===hoje).length;
}

/* ── TABLE ── */
const FUNCAO_CLASS = {
  'Secretário(a) de Educação':'fb-sec',
  'Secretário(a) Adjunto(a)':'fb-adj',
  'Diretor(a) de Educação':'fb-dir',
  'Coordenador(a) Pedagógico(a)':'fb-coord',
  'Técnico(a) de Educação':'fb-tec',
  'Outro':'fb-out',
};

function renderTable(){
  const q = document.getElementById('search').value.toLowerCase();
  const rows = allData.filter(r=>
    !q || r.nome?.toLowerCase().includes(q) ||
          r.cidade?.toLowerCase().includes(q) ||
          r.funcao?.toLowerCase().includes(q)
  );
  const tbody = document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><div style="font-size:32px">📭</div><p>Nenhum registro encontrado</p></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((r,i)=>{
    const date = r.created_at ? new Date(r.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const wppNum = r.whatsapp ? '55'+r.whatsapp : '';
    const fc = FUNCAO_CLASS[r.funcao] || 'fb-out';
    return `<tr>
      <td style="color:#aaa;font-size:11px">${i+1}</td>
      <td style="font-weight:700">${esc(r.nome||'—')}</td>
      <td><span class="cidade-badge">${esc(r.cidade||'—')}</span></td>
      <td><span class="funcao-badge ${fc}">${esc(r.funcao||'—')}</span></td>
      <td>${wppNum ? `<a class="wpp-link" href="https://wa.me/${wppNum}" target="_blank">📱 ${formatWpp(r.whatsapp)}</a>` : '—'}</td>
      <td style="color:#aaa;font-size:12px;white-space:nowrap">${date}</td>
    </tr>`;
  }).join('');
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML }
function formatWpp(w){ return w ? w.replace(/^(\d{2})(\d{1})(\d{4})(\d{4})/,'($1) $2 $3-$4') : '—' }

/* ── SORTEIO ── */
function renderSorteio(s){
  const el = document.getElementById('winner-display');
  if(s && s.winner_nome){
    el.className = 'winner-badge';
    el.textContent = `🏆 ${s.winner_nome} — ${s.winner_cidade||''}`;
  } else if(s && !s.ativo){
    el.className = 'no-winner';
    el.textContent = '🔒 Evento encerrado';
  } else {
    el.className = 'no-winner';
    el.textContent = '⏳ Sem ganhador ainda';
  }
}

async function resetSorteio(){
  if(!confirm('Resetar o sorteio vai apagar o ganhador atual e permitir novo sorteio. Continuar?')) return;
  showLoading('Resetando sorteio…');
  try{
    await sb.from('sorteio')
      .update({ winner_nome: null, winner_cidade: null, winner_id: null, ativo: true })
      .eq('evento', EVENTO_ID);
    hideLoading();
    toast('✅ Sorteio resetado! Todos podem girar novamente.');
    loadData();
  } catch(e){ hideLoading(); toast('Erro: '+e.message, true); }
}

async function closeSorteio(){
  if(!confirm('Encerrar o evento vai impedir novos giros na roleta. Continuar?')) return;
  showLoading('Encerrando evento…');
  try{
    await sb.from('sorteio').update({ ativo: false }).eq('evento', EVENTO_ID);
    hideLoading();
    toast('🔒 Evento encerrado com sucesso.');
    loadData();
  } catch(e){ hideLoading(); toast('Erro: '+e.message, true); }
}

/* ── EXPORT CSV ── */
function exportCSV(){
  const rows = [['#','Nome','Cidade','Função','WhatsApp','Data']];
  allData.forEach((r,i)=>{
    const date = r.created_at ? new Date(r.created_at).toLocaleString('pt-BR') : '';
    rows.push([i+1, r.nome||'', r.cidade||'', r.funcao||'', r.whatsapp||'', date]);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `secretarios-${EVENTO_ID}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('📥 CSV exportado com sucesso!');
}

/* ── UI HELPERS ── */
function showLoading(txt){ document.getElementById('ltxt').textContent=txt||'Carregando…'; document.getElementById('loading').classList.add('show') }
function hideLoading(){ document.getElementById('loading').classList.remove('show') }
function toast(msg, err=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#E53E3E' : 'var(--azul)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
